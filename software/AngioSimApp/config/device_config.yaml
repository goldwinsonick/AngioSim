# ============================================================
# Cardiac Phantom Device Configuration
# ============================================================
# mode:
#   mock     = test GUI tanpa Arduino/ESP32
#   hardware = komunikasi serial asli
# ============================================================

mode: mock

serial:
  port: COM3
  baudrate: 115200
  read_timeout_sec: 0.1
  reconnect_interval_sec: 2.0

device:
  auto_ping_interval_ms: 1000
  status_interval_ms: 1000

parameters:
  heart_pump_pwm: 125
  water_pump_pwm: 100
